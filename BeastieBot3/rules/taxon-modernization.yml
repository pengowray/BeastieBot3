# Taxonomy modernization for the SPRAT (EPBC) Australia lists.
#
# SPRAT carries some order names in an obsolete or misspelled form. This file lists ONLY the
# high-confidence corrections that are auto-applied to the generated lists: safe 1:1 renames /
# typos, plus the structural mammal fixes that are textbook (not judgement calls). Every change is
# recorded and surfaced in the modernization report; debatable names (most bird/fish/gastropod
# orders) are deliberately NOT here — they are flagged in the CSV-recommendations report instead.
#
# kind:  typo       — a misspelling of the same name (e.g. Sqaliformes → Squaliformes)
#        obsolete   — a superseded name for the same circumscription (Insectivora → Eulipotyphla)
#        structural — a real reclassification (Pinnipedia nested within Carnivora; a split by family)
#
# epbc_listed_as: set when the original spelling appears in the official EPBC listing itself (i.e. a
#        genuine "sic" worth a citation), as opposed to a CSV-only artefact corrected by every modern
#        authority. Drives whether the list emits a referenced note vs. a silent correction.
# fixed_elsewhere: true when modern authorities already use the corrected name (so the SPRAT spelling
#        is a data artefact); false/absent when the official source still carries it. Reported per change.

# --- Simple 1:1 order renames ---------------------------------------------------------------------
orders:
  - from: Diprotodonta
    to: Diprotodontia
    kind: typo
    epbc_listed_as: Diprotodonta
    fixed_elsewhere: true
    note: Malformed ending; the valid ordinal name is Diprotodontia.
  - from: Insectivora
    to: Eulipotyphla
    kind: obsolete
    fixed_elsewhere: true
    note: Insectivora is an abandoned polyphyletic order; Australian shrews are Eulipotyphla.
  - from: Pinnipedia
    to: Carnivora
    kind: structural
    fixed_elsewhere: true
    note: Pinnipeds are a clade within Carnivora, not a separate order.
  - from: Sqaliformes
    to: Squaliformes
    kind: typo
    epbc_listed_as: Sqaliformes
    fixed_elsewhere: true
    note: Misspelling of Squaliformes (dogfish sharks).
  - from: Halociprida
    to: Halocyprida
    kind: typo
    fixed_elsewhere: true
    note: Misspelling of Halocyprida (ostracods).
  - from: Cyclophyllideae
    to: Cyclophyllidea
    kind: typo
    fixed_elsewhere: true
    note: "Misspelling of Cyclophyllidea (tapeworms); -ideae is a botanical subfamily ending."

# --- Family-conditional splits (one obsolete order → several modern orders, keyed by family) -------
order_by_family:
  Polyprotodonta:
    Dasyuridae: Dasyuromorphia
    Myrmecobiidae: Dasyuromorphia
    Thylacinidae: Dasyuromorphia
    Peramelidae: Peramelemorphia
    Thylacomyidae: Peramelemorphia
    Notoryctidae: Notoryctemorphia

# --- Per-order notes + Wikipedia references emitted under a modernized order heading. -------------
# A modernized heading carries a small note crediting the modern authority (the Australian Faunal
# Directory) and naming the obsolete SPRAT/EPBC form. Only emitted when that order was actually a
# modernization target in the list (so e.g. Carnivora is annotated only where pinnipeds were folded in).
order_notes:
  Diprotodontia:
    ref_name: afd-diprotodontia
    note: "Order name follows the [[Australian Faunal Directory]]; the EPBC source data uses the older spelling ''Diprotodonta''."
    reference: "{{cite web |title=Order DIPROTODONTIA |website=Australian Faunal Directory |publisher=Australian Biological Resources Study |url=https://biodiversity.org.au/afd/taxa/DIPROTODONTIA |access-date=26 June 2026}}"
  Dasyuromorphia:
    ref_name: afd-dasyuromorphia
    note: "Order placement follows the [[Australian Faunal Directory]]; the EPBC source data groups these families under the obsolete order ''Polyprotodonta''."
    reference: "{{cite web |title=Order DASYUROMORPHIA |website=Australian Faunal Directory |publisher=Australian Biological Resources Study |url=https://biodiversity.org.au/afd/taxa/DASYUROMORPHIA |access-date=26 June 2026}}"
  Peramelemorphia:
    ref_name: afd-peramelemorphia
    note: "Order placement follows the [[Australian Faunal Directory]]; the EPBC source data groups these families under the obsolete order ''Polyprotodonta''."
    reference: "{{cite web |title=Order PERAMELEMORPHIA |website=Australian Faunal Directory |publisher=Australian Biological Resources Study |url=https://biodiversity.org.au/afd/taxa/PERAMELEMORPHIA |access-date=26 June 2026}}"
  Eulipotyphla:
    ref_name: mdd-eulipotyphla
    note: "The order Eulipotyphla follows the [[American Society of Mammalogists]]' [[Mammal Diversity Database]]; the EPBC source data and the [[Australian Faunal Directory]] both retain the obsolete order ''Insectivora''."
    reference: "{{cite web |title=Order Eulipotyphla |website=Mammal Diversity Database |publisher=American Society of Mammalogists |url=https://www.mammaldiversity.org/order/eulipotyphla/ |access-date=26 June 2026}}"
  Carnivora:
    ref_name: afd-carnivora
    note: "The pinnipeds (seals and sea lions) are placed in Carnivora following the [[Australian Faunal Directory]]; the EPBC source data lists them under the separate order ''Pinnipedia''."
    reference: "{{cite web |title=Order CARNIVORA |website=Australian Faunal Directory |publisher=Australian Biological Resources Study |url=https://biodiversity.org.au/afd/taxa/CARNIVORA |access-date=26 June 2026}}"

# --- Orders deliberately NOT auto-changed: flagged for review in the CSV-recommendations report. ---
# These are obsolete/non-standard but need judgement (a contested split, a name still in wide use, or a
# group outside the current mammal focus). `suggest` is the likely modern name; refine before applying.
flag_orders:
  - order: Ardeiformes
    suggest: Pelecaniformes
    note: Non-standard ordinal name for herons/ibises; modern treatment places them in Pelecaniformes.
  - order: Opisthobranchia
    suggest: (informal clade)
    note: Obsolete gastropod grouping, now a paraphyletic informal clade rather than an order.
  - order: Streptoneura
    suggest: (informal clade)
    note: Obsolete gastropod grouping (prosobranchs); not a modern order.
  - order: Hydroida
    suggest: Anthoathecata / Leptothecata
    note: Old hydrozoan order, split in modern classification.
  - order: Forcipulata
    suggest: Forcipulatida
    note: Old sea-star order name; modern ending is -ida.
  - order: Pulmonata
    suggest: (informal clade)
    note: Traditional air-breathing snail grouping, now informal rather than a ranked order.
  - order: Cetacea
    suggest: Cetacea (kept)
    note: Nested within Artiodactyla phylogenetically, but Cetacea is retained here as it remains near-universal.
