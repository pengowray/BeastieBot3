# Taxonomic group definitions for Wikipedia list generation.
# Each group defines the filters needed to select taxa from the IUCN database.
# Reference these by name in wikipedia-lists.yml using "taxa_group: <name>"
#
# Listing styles (display.listing_style):
# - CommonNameFocus (default): [[Common name]] (''Scientific name'') (e.g. for reptiles)
# - ScientificNameFocus: ''[[Scientific name]]'', Common name (for plants/invertebrates)
# - CommonNameOnly: [[Common name]] (for mammals, birds, sharks+rays) -- Scientific name (italicized) displayed when common name is missing.
# notes: Link points to the taxon page if known, otherwise redlink to scientific name from IUCN assessment.

groups:
  # ==================== ANIMALIA - VERTEBRATES ====================
  amphibians:
    name: "Amphibians"
    adjective: "amphibian"
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Amphibia

  birds:
    name: "Birds"
    adjective: "bird"
    display:
      listing_style: CommonNameOnly  # All birds have common names
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Aves

  reptiles:
    name: "Reptiles"
    adjective: "reptile"
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Reptilia

  mammals:
    name: "Mammals"
    adjective: "mammalian"
    display:
      listing_style: CommonNameOnly  # All mammals have common names
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Mammalia

  # Marine mammals (paraphyletic): Cetaceans, Sirenians, Pinnipeds, Sea Otters, Polar Bears
  # Uses IUCN's "Marine" system tag for accurate filtering
  marine-mammals:
    name: "Marine mammals"
    adjective: "marine mammal"
    display:
      listing_style: CommonNameOnly  # All marine mammals have common names
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Mammalia
      - system: Marine
    # Custom grouping for display: organize by biological group, not order
    custom_groups:
      - name: Cetaceans
        common_name: cetacean
        common_plural: cetaceans
        main_article: Cetacea
        families:
          - BALAENIDAE
          - BALAENOPTERIDAE
          - DELPHINIDAE
          - ESCHRICHTIIDAE
          - INIIDAE
          - KOGIIDAE
          - LIPOTIDAE
          - MONODONTIDAE
          - NEOBALAENIDAE
          - PHOCOENIDAE
          - PHYSETERIDAE
          - PLATANISTIDAE
          - PONTOPORIIDAE
          - ZIPHIIDAE
      - name: Sirenians
        common_name: sirenian
        common_plural: sirenians
        main_article: Sirenia
        families:
          - DUGONGIDAE
          - TRICHECHIDAE
      - name: Pinnipeds
        common_name: pinniped
        common_plural: pinnipeds
        main_article: Pinniped
        families:
          - OTARIIDAE
          - PHOCIDAE
          - ODOBENIDAE
      - name: Other marine mammals
        common_plural: other marine mammals
        main_article: Marine mammal
        default: true
        # Catches sea otters (Mustelidae) and polar bear (Ursidae)

  ray-finned-fishes:
    name: "Ray-finned fishes"
    adjective: "ray-finned fish"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Actinopterygii

  sharks-rays:
    name: "Sharks and rays"
    adjective: "shark and ray"
    display:
      listing_style: CommonNameOnly  # Sharks/rays have common names
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Chondrichthyes

  # ==================== ANIMALIA - INVERTEBRATES ====================
  # Note: Invertebrates typically use ScientificNameFocus because common names are sparse/unreliable
  insects:
    name: "Insects"
    adjective: "insect"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Insecta

  gastropods:
    name: "Gastropods"
    adjective: "gastropod"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Gastropoda

  bivalves:
    name: "Bivalves"
    adjective: "bivalve"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Bivalvia

  crustaceans:
    name: "Crustaceans"
    adjective: "crustacean"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Malacostraca

  corals:
    name: "Corals"
    adjective: "coral"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Anthozoa

  arachnids:
    name: "Arachnids"
    adjective: "arachnid"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Animalia
      - rank: class
        value: Arachnida

  # ==================== ANIMALIA - KINGDOM LEVEL ====================
  animals:
    name: "Animals"
    adjective: "animal"
    filters:
      - rank: kingdom
        value: Animalia

  # ==================== PLANTAE ====================
  # Note: Plants use ScientificNameFocus because common names are sparse/unreliable
  plants:
    name: "Plants"
    adjective: "plant"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Plantae

  conifers:
    name: "Conifers"
    adjective: "conifer"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Plantae
      - rank: class
        value: Pinopsida

  cycads:
    name: "Cycads"
    adjective: "cycad"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Plantae
      - rank: class
        value: Cycadopsida

  # ==================== OTHER KINGDOMS ====================
  fungi:
    name: "Fungi"
    adjective: "fungus"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Fungi

  chromista:
    name: "Chromista"
    adjective: "chromist"
    display:
      listing_style: ScientificNameFocus
    filters:
      - rank: kingdom
        value: Chromista
